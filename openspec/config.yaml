schema: spec-driven-zh

context: |
  Project: snw-agent-link
  Runtime: Go 1.25+，A2A Go SDK v2，SQLite，Tailscale Local API
  Key modules:
    - cmd/snw-agent-linkd：跨平台主机守护进程
    - cmd/snw-agent-link：本地管理 CLI
    - internal/identity：Agent 独立身份和签名
    - internal/pairing：双向白名单状态机
    - internal/store：SQLite、outbox、幂等和审计
    - internal/transport：A2A REST、JSON-RPC、SSE 网关
    - adapters/codex：Codex Plugin、Hook、MCP 和 app-server 适配器
  Conventions:
    - 用户面向文档默认使用简体中文。
    - 所有 Agent 完全对等，不使用本地端、远端、客户端或服务端角色建模。
    - 核心保持 Agent 无关，Codex 逻辑不得进入核心包。
    - 代码、命令、路径、schema ID 和结构标记保持工具要求的原格式。
  Constraints:
    - 控制面使用自托管 Headscale，数据面使用 Tailscale 开源客户端，不依赖官方 Tailscale SaaS。
    - 双向白名单只控制通信准入，不控制接收 Agent 的执行权限。
    - 不参考工作区兄弟项目实现，只依据本项目和官方规范。
    - 外部消息始终是不可信输入，不能覆盖本地 system/developer 规则。

rules:
  proposal:
    - 默认使用简体中文。
    - 明确受影响的运行边界、协议和安全边界。
  specs:
    - requirement 和 scenario 默认使用简体中文。
    - 保留 OpenSpec 结构标记原样。
  design:
    - 聚焦架构、边界、权衡、风险和迁移。
    - 跨模块改动必须给出消息流或数据流。
  tasks:
    - 任务必须可执行、可验证并引用真实测试命令。
