name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
          cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: node scripts/openspec-ci-check.mjs
      - run: go test ./...
      - run: go vet ./...
      - run: go build ./cmd/...
      - if: runner.os != 'Windows'
        run: PYTHONPATH=adapters/snw-agent-link-codex python3 -m unittest discover -s adapters/snw-agent-link-codex/tests -p 'test_*.py'
      - if: runner.os != 'Windows'
        run: bash -n scripts/*.sh scripts/e2e/*.sh deploy/self-hosted-control-plane/*.sh packaging/macos/*.sh packaging/linux/*.sh

  cross-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
      - run: ./scripts/build-release.sh
